AWSTemplateFormatVersion: '2010-09-09'
Description: HPC-Application-Best-Practice with OpenZFS /home, Lustre /fsx and Active Directory multi-user

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Active Directory
        Parameters:
          - DomainName
          - AdminPassword
      - Label:
          default: Cluster
        Parameters:
          - KeyName
          - HeadNodeInstanceType
      - Label:
          default: Storage
        Parameters:
          - OpenZFSStorageCapacity
          - OpenZFSThroughputCapacity
    ParameterLabels:
      DomainName:
        default: 'AD Domain Name:'
      AdminPassword:
        default: 'AD Admin Password:'
      KeyName:
        default: 'SSH Key Name:'
      HeadNodeInstanceType:
        default: 'Head Node Instance Type:'
      OpenZFSStorageCapacity:
        default: 'OpenZFS Storage Capacity (GiB):'
      OpenZFSThroughputCapacity:
        default: 'OpenZFS Throughput Capacity (MB/s):'

Parameters:
  DomainName:
    Description: Active Directory domain name.
    Type: String
    Default: corp.pcluster.com
    AllowedPattern: ^([a-zA-Z0-9]+[\.-])+([a-zA-Z0-9])+$
  AdminPassword:
    Description: Active Directory Admin password (also used for the seeded users).
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 64
    AllowedPattern: (?=^.{8,64}$)((?=.*\d)(?=.*[A-Z])(?=.*[a-z])|(?=.*\d)(?=.*[^A-Za-z0-9\s])(?=.*[a-z])|(?=.*[^A-Za-z0-9\s])(?=.*[A-Z])(?=.*[a-z])|(?=.*\d)(?=.*[A-Z])(?=.*[^A-Za-z0-9\s]))^.*
  KeyName:
    Description: Existing EC2 KeyPair name for SSH access to the head node.
    Type: AWS::EC2::KeyPair::KeyName
  HeadNodeInstanceType:
    Description: Instance type for the head node.
    Type: String
    Default: c7a.2xlarge
  OpenZFSStorageCapacity:
    Description: FSx OpenZFS capacity in GiB used for /home.
    Type: Number
    Default: 256
    MinValue: 64
    MaxValue: 524288
  OpenZFSThroughputCapacity:
    Description: FSx OpenZFS throughput capacity in MB/s.
    Type: Number
    Default: 160
    AllowedValues: [160, 320, 640, 1280, 2560, 3840, 5120, 7680, 10240]

Resources:

  # ---------------------------------------------------------------------------
  # Network: VPC, public/private subnets, NAT, security groups.
  # ---------------------------------------------------------------------------
  HPCNetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://hpc-applications-best-practice.s3.eu-west-1.amazonaws.com/HPC-Networking.yaml

  # ---------------------------------------------------------------------------
  # FSx Lustre for /fsx
  # ---------------------------------------------------------------------------
  HPCStorageStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://hpc-applications-best-practice.s3.eu-west-1.amazonaws.com/HPC-Storage.yaml
      Parameters:
        PrivateSubnet: !GetAtt HPCNetworkStack.Outputs.PrivateSubnetA
        SecurityGroup: !GetAtt HPCNetworkStack.Outputs.localSG

  # ---------------------------------------------------------------------------
  # FSx OpenZFS for /home
  # ---------------------------------------------------------------------------
  HPCStorageOpenZFSStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://hpc-applications-best-practice.s3.eu-west-1.amazonaws.com/HPC-Storage-OpenZFS.yaml
      Parameters:
        PrivateSubnet: !GetAtt HPCNetworkStack.Outputs.PrivateSubnetA
        SecurityGroup: !GetAtt HPCNetworkStack.Outputs.localSG
        StorageCapacity: !Ref OpenZFSStorageCapacity
        ThroughputCapacity: !Ref OpenZFSThroughputCapacity

  # ---------------------------------------------------------------------------
  # Active Directory (Microsoft AD + helper resources)
  # ---------------------------------------------------------------------------
  HPCActiveDirectoryStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://hpc-applications-best-practice.s3.eu-west-1.amazonaws.com/HPC-ActiveDirectory.yaml
      Parameters:
        DomainName: !Ref DomainName
        AdminPassword: !Ref AdminPassword
        Vpc: !GetAtt HPCNetworkStack.Outputs.VPC
        PrivateSubnetOne: !GetAtt HPCNetworkStack.Outputs.PrivateSubnetA
        # Microsoft AD + LDAPS NLB require two subnets in two AZs.
        # Both placed in private subnets so nothing ends up in a public subnet.
        DirectorySubnetOne: !GetAtt HPCNetworkStack.Outputs.PrivateSubnetA
        DirectorySubnetTwo: !GetAtt HPCNetworkStack.Outputs.PrivateSubnetB

  # ---------------------------------------------------------------------------
  # IAM policy attached to PC nodes so they can attach extra policies.
  # Scoped to the role paths ParallelCluster creates so this can't be misused
  # to attach AdministratorAccess to arbitrary roles in the account.
  # ---------------------------------------------------------------------------
  PClusterPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'pc-attach-policy-${AWS::StackName}'
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
            Resource:
              - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/parallelcluster/*'

  # ---------------------------------------------------------------------------
  # ParallelCluster custom resource provider.
  # ---------------------------------------------------------------------------
  PclusterClusterProvider:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        AdditionalIamPolicies: !Ref PClusterPolicy
      TemplateURL: !Sub
        - https://${AWS::Region}-aws-parallelcluster.s3.${AWS::Region}.${AWS::URLSuffix}/parallelcluster/${Version}/templates/custom_resource/cluster.yaml
        - Version: 3.15.0

  # ---------------------------------------------------------------------------
  # ParallelCluster cluster: AD-integrated, OpenZFS /home, Lustre /fsx,
  # OnNodeStart pulls the LDAPS CA cert from Secrets Manager so SSSD can start.
  # ---------------------------------------------------------------------------
  PclusterCluster:
    Type: Custom::PclusterCluster
    Properties:
      ServiceToken: !GetAtt [ PclusterClusterProvider, Outputs.ServiceToken ]
      ClusterName: !Sub 'pc-${AWS::StackName}'
      ClusterConfiguration:
        Imds:
          ImdsSupport: v2.0
        Region: !Ref AWS::Region
        Image:
          Os: alinux2023
        DirectoryService:
          DomainName: !Ref DomainName
          DomainAddr: !GetAtt HPCActiveDirectoryStack.Outputs.DomainAddrLdaps
          PasswordSecretArn: !GetAtt HPCActiveDirectoryStack.Outputs.ReadOnlyPasswordSecretArn
          DomainReadOnlyUser: !GetAtt HPCActiveDirectoryStack.Outputs.DomainReadOnlyUser
          LdapTlsCaCert: /opt/parallelcluster/shared/directory_service/domain-certificate.crt
          LdapTlsReqCert: hard
          GenerateSshKeysForUsers: true
          AdditionalSssdConfigs:
            override_homedir: /home/%u
        HeadNode:
          InstanceType: !Ref HeadNodeInstanceType
          Ssh:
            KeyName: !Ref KeyName
          Networking:
            SubnetId: !GetAtt HPCNetworkStack.Outputs.PrivateSubnetA
            AdditionalSecurityGroups:
              - !GetAtt HPCNetworkStack.Outputs.localSG
          DisableSimultaneousMultithreading: false
          SharedStorageType: Efs
          LocalStorage:
            RootVolume:
              Size: 100
              Encrypted: true
              VolumeType: gp3
              DeleteOnTermination: true
          CustomActions:
            OnNodeStart:
              Script: s3://hpc-applications-best-practice/ad-certificate-setup.sh
              Args:
                - !GetAtt HPCActiveDirectoryStack.Outputs.DomainCertificateSecretArn
          Iam:
            AdditionalIamPolicies:
              - Policy: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
              - Policy: !GetAtt HPCActiveDirectoryStack.Outputs.DomainCertificateSecretReadPolicy
            S3Access:
              - BucketName: '*'
                EnableWriteAccess: true
          Imds:
            Secured: true
        Scheduling:
          Scheduler: slurm
          SlurmSettings:
            ScaledownIdletime: 10
            QueueUpdateStrategy: TERMINATE
            EnableMemoryBasedScheduling: true
          SlurmQueues:
            - Name: hpc8a
              CapacityType: ONDEMAND
              Networking:
                SubnetIds:
                  - !GetAtt HPCNetworkStack.Outputs.PrivateSubnetA
                AdditionalSecurityGroups:
                  - !GetAtt HPCNetworkStack.Outputs.localSG
                PlacementGroup:
                  Enabled: true
              ComputeResources:
                - Name: hpc8a-96xlarge
                  InstanceType: hpc8a.96xlarge
                  MinCount: 0
                  MaxCount: 200
                  Efa:
                    Enabled: true
              Iam:
                AdditionalIamPolicies:
                  - Policy: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
                  - Policy: !GetAtt HPCActiveDirectoryStack.Outputs.DomainCertificateSecretReadPolicy
                S3Access:
                  - BucketName: '*'
                    EnableWriteAccess: true
              CustomActions:
                OnNodeStart:
                  Script: s3://hpc-applications-best-practice/ad-certificate-setup.sh
                  Args:
                    - !GetAtt HPCActiveDirectoryStack.Outputs.DomainCertificateSecretArn
            - Name: hpc6id
              CapacityType: ONDEMAND
              Networking:
                SubnetIds:
                  - !GetAtt HPCNetworkStack.Outputs.PrivateSubnetA
                AdditionalSecurityGroups:
                  - !GetAtt HPCNetworkStack.Outputs.localSG
                PlacementGroup:
                  Enabled: true
              ComputeResources:
                - Name: hpc6id-32xlarge
                  InstanceType: hpc6id.32xlarge
                  MinCount: 0
                  MaxCount: 200
                  Efa:
                    Enabled: true
              Iam:
                AdditionalIamPolicies:
                  - Policy: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
                  - Policy: !GetAtt HPCActiveDirectoryStack.Outputs.DomainCertificateSecretReadPolicy
                S3Access:
                  - BucketName: '*'
                    EnableWriteAccess: true
              CustomActions:
                OnNodeStart:
                  Script: s3://hpc-applications-best-practice/ad-certificate-setup.sh
                  Args:
                    - !GetAtt HPCActiveDirectoryStack.Outputs.DomainCertificateSecretArn
        SharedStorage:
          - Name: FsxLustre
            StorageType: FsxLustre
            MountDir: /fsx
            FsxLustreSettings:
              FileSystemId: !GetAtt HPCStorageStack.Outputs.FileSystemId
          - Name: OpenZFSHome
            StorageType: FsxOpenZfs
            MountDir: /home
            FsxOpenZfsSettings:
              VolumeId: !GetAtt HPCStorageOpenZFSStack.Outputs.RootVolumeId
        Monitoring:
          DetailedMonitoring: true
          Logs:
            CloudWatch:
              Enabled: true
              RetentionInDays: 30
              DeletionPolicy: Retain
            Rotation:
              Enabled: true
          Dashboards:
            CloudWatch:
              Enabled: true

Outputs:
  HeadNodePrivateIp:
    Description: Private IP address of the head node
    Value: !GetAtt [ PclusterCluster, headNode.privateIpAddress ]
  HeadNodeInstanceId:
    Description: Instance ID of the head node
    Value: !GetAtt [ PclusterCluster, headNode.instanceId ]
  SystemManagerUrl:
    Description: URL to access the head node via Session Manager
    Value: !Sub
      - https://${ConsoleDomain}/systems-manager/session-manager/${InstanceId}?region=${AWS::Region}
      - ConsoleDomain: !Sub '${AWS::Region}.console.aws.amazon.com'
        InstanceId: !GetAtt [ PclusterCluster, headNode.instanceId ]
  VpcId:
    Description: VPC created by the network stack
    Value: !GetAtt HPCNetworkStack.Outputs.VPC
  LustreFileSystemId:
    Description: FSx Lustre filesystem mounted on /fsx
    Value: !GetAtt HPCStorageStack.Outputs.FileSystemId
  OpenZFSFileSystemId:
    Description: FSx OpenZFS filesystem mounted on /home
    Value: !GetAtt HPCStorageOpenZFSStack.Outputs.FileSystemId
  OpenZFSDNSName:
    Value: !GetAtt HPCStorageOpenZFSStack.Outputs.DNSName
  DomainName:
    Value: !GetAtt HPCActiveDirectoryStack.Outputs.DomainName
  ReadOnlyPasswordSecretArn:
    Value: !GetAtt HPCActiveDirectoryStack.Outputs.ReadOnlyPasswordSecretArn
  DomainCertificateSecretArn:
    Value: !GetAtt HPCActiveDirectoryStack.Outputs.DomainCertificateSecretArn
